title: Tom Ootes
description: Tom Ootes is een geëngageerde software-developer, werkzaam voor de Nederlandse overheid.
author:
  name: Tom Ootes
  email: tom@ootes.io
lang: nl
feed:
  posts_limit: 20
baseurl: ""
url: "https://ootes.io"
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag
sass:
  sass_dir: _scss
exclude:
  - "/node_modules"
  - Gemfile
  - Gemfile.lock
  - README.md
  - package.json
  - postcss.config.js
  - tailwind.config.js
  - _sass
  - css
  - js

collections:
  projects:
    output: true
    permalink: /:collection/:name/
  talks:
    output: true
    permalink: /:collection/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
  - scope:
      path: ""
      type: posts
    values:
      layout: blog
